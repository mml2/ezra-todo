# Local/demo deployment of the full stack. Frontend (nginx) serves the SPA and
# proxies /api to the backend; backend runs the .NET API against SQLite on a
# named volume so data survives restarts.
#
#   docker compose up --build      # build images and start
#   docker compose down            # stop (add -v to also drop the db volume)
#
# Jwt:Key is required at startup. For a real deployment, supply it from a
# secrets manager / env file rather than the demo default below.
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Data Source=/app/data/todoapp.db"
      Jwt__Key: "${JWT_KEY:-dev-signing-key-at-least-32-bytes-long-for-testing}"
      Jwt__Issuer: ezra-todo
      Jwt__Audience: ezra-todo-client
      Jwt__ExpiryMinutes: "60"
    volumes:
      - todo-data:/app/data
    expose:
      - "8080"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  todo-data:
