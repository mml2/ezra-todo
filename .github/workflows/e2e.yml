name: E2E

on:
  pull_request:
    branches: [master]

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright e2e
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Playwright's webServer boots the backend itself (reuseExistingServer is
      # false under CI), so the .NET SDK must be on the runner.
      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      # The e2e webServer runs `npm run dev` in ../frontend, so the frontend
      # deps must be installed too.
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install e2e dependencies
        working-directory: e2e
        run: npm ci

      - name: Install Playwright browsers
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      # Warm the .NET build so Playwright's 120s server-start timeout isn't spent
      # compiling the backend on first `dotnet run`.
      - name: Build backend
        run: dotnet build backend/TodoApi/TodoApi.csproj --configuration Debug

      - name: Run Playwright tests
        working-directory: e2e
        run: npm test

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
