name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      # Coverage is collected but does NOT fail the build yet (no threshold gate).
      - name: Unit tests with coverage
        run: npm run coverage

  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore backend/TodoApi.Tests/TodoApi.Tests.csproj

      - name: Build
        run: dotnet build backend/TodoApi.Tests/TodoApi.Tests.csproj --no-restore --configuration Release

      # Coverage collected via the built-in XPlat collector; reported, not gated.
      - name: Test
        run: >
          dotnet test backend/TodoApi.Tests/TodoApi.Tests.csproj
          --no-build --configuration Release
          --logger "console;verbosity=normal"
          --collect:"XPlat Code Coverage"
